{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyHub Planner</title>

    <link rel="stylesheet" href="{% static 'planner/styles.css' %}">

</head>
<body>

    <nav class="navbar">

    <h1>StudyHub Planner</h1>

    <div>

        {% if user.is_authenticated %}

            <a href="{% url 'logout' %}">Logout</a>

        {% else %}

            <a href="{% url 'login' %}">Login</a>

            <a href="{% url 'register' %}">Register</a>

        {% endif %}

    </div>

</nav>
    <div class="container">

        {% block body %}
        {% endblock %}

    </div>

    <script src="{% static 'planner/script.js' %}"></script>

</body>
</html>
